<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI楽天検索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 基本設定 */
        body { background-color: #e0e0e0; display: flex; justify-content: center; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .mobile-wrapper { background-color: #ffffff; width: 100%; max-width: 480px; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; padding-bottom: 80px; }
        .hero-section { background: linear-gradient(135deg, #bf0000 0%, #ff4b4b 100%); color: white; padding: 20px 15px; border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        
        .category-btn { 
            border: 1px solid #eee; background: #f8f9fa; border-radius: 12px; padding: 15px 10px; 
            text-align: center; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; font-weight: bold; color: #444; font-size: 0.85rem; cursor: pointer;
        }
        
        /* アイコンはデフォルトのフォルダアイコンを使用するためCSSはシンプルに */
        .category-icon { font-size: 1.8rem; color: #bf0000; margin-bottom: 5px; display: inline-block; }
        
        .back-btn { background: none; border: none; color: #bf0000; font-weight: bold; font-size: 0.9rem; margin-bottom: 10px; display: inline-flex; align-items: center; gap: 5px; }
        .product-card { border: none; border-bottom: 1px solid #eee; padding: 15px 0; }
        .compare-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 440px; background: #222; color: white; padding: 12px 20px; border-radius: 50px; display: none; align-items: center; justify-content: space-between; z-index: 1000; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; flex-direction: column; border-radius: 0 0 20px 20px; }

        /* 比較表スタイル */
        .modal-dialog { margin: 0 !important; height: 100% !important; max-width: 100% !important; display: flex !important; align-items: flex-start !important; }
        .modal-content { border: none !important; border-radius: 0 !important; min-height: 100vh; }
        .modal-header { padding: 8px 15px !important; border-bottom: 1px solid #eee; }
        .modal-body { padding: 0 !important; background-color: #fff; overflow-y: auto; }
        .comparison-wrapper { overflow-x: auto; white-space: nowrap; width: 100%; padding-bottom: 50px; -webkit-overflow-scrolling: touch; }
        .comparison-wrapper table { margin-bottom: 0; border-collapse: collapse; font-size: 0.85rem; table-layout: fixed; }
        .comparison-wrapper th, .comparison-wrapper td { vertical-align: top; white-space: normal; padding: 10px 8px; border: 1px solid #dee2e6; box-sizing: border-box; width: 400px; min-width: 400px; }
        .comparison-wrapper th { background-color: #f8f9fa; color: #333; font-weight: bold; text-align: center; vertical-align: middle; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.1); }
        
        .comparison-wrapper th:first-child, .comparison-wrapper td:first-child { width: 140px !important; min-width: 140px !important; max-width: 140px !important; position: sticky; left: 0; z-index: 15; background-color: #fffafa; box-shadow: 2px 0 2px -1px rgba(0,0,0,0.1); }
        .comparison-wrapper td:first-child { height: 1px; padding: 0; border-right: 1px solid #ddd; position: relative; }
        .p-name-box { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; padding: 10px 8px; box-sizing: border-box; font-size: 0.8rem; line-height: 1.4; font-weight: bold; display: flex; align-items: flex-start; white-space: normal; }
        .comparison-wrapper th:nth-child(2), .comparison-wrapper td:nth-child(2), .comparison-wrapper th:nth-child(3), .comparison-wrapper td:nth-child(3) { width: 100px !important; min-width: 100px !important; text-align: center; }
    </style>
</head>
<body>

    <div class="mobile-wrapper">
        <div class="hero-section text-center">
            <h1 class="h5 fw-bold mb-3"><i class="fas fa-robot"></i> AI楽天コンシェルジュ</h1>
            <div class="input-group">
                <input type="text" id="searchInput" class="form-control" placeholder="例: 30代男性 プレゼント..." style="border-radius: 20px 0 0 20px; border:none;">
                <button class="btn btn-light text-danger fw-bold" type="button" onclick="handleFreeSearch()" style="border-radius: 0 20px 20px 0;">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>

        <div class="container">
            <div id="categoryArea" class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h6 class="fw-bold m-0 text-secondary"><i class="fas fa-list-ul"></i> カテゴリー</h6>
                    <button id="categoryBackBtn" class="back-btn" style="display:none;" onclick="goBackCategory()">
                        <i class="fas fa-arrow-left"></i> 戻る
                    </button>
                </div>
                <h6 id="currentCategoryTitle" class="small text-danger fw-bold mb-2" style="display:none;"></h6>
                
                <div id="catLoading" class="text-center py-3" style="display:none;">
                    <div class="spinner-border text-danger spinner-border-sm" role="status"></div>
                    <span class="small text-muted ms-2">読み込み中...</span>
                </div>

                <div id="categoryContainer" class="row row-cols-3 g-2"></div>
            </div>

            <hr>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="fw-bold m-0 text-secondary">商品一覧</h6>
                <select class="form-select form-select-sm w-auto border-0 bg-light" id="sortSelect" onchange="reSort()">
                    <option value="-reviewCount">人気順</option>
                    <option value="+itemPrice">安い順</option>
                    <option value="-itemPrice">高い順</option>
                </select>
            </div>
            <div id="resultCount" class="small text-muted mb-2 text-end"></div>
            <div id="resultsArea">
                <div class="text-center py-5 text-muted small">
                    <i class="fas fa-search fa-2x mb-2 opacity-25"></i><br>
                    カテゴリーを選ぶか<br>キーワードを入力してください
                </div>
            </div>
        </div>

        <div id="compareBar" class="compare-bar">
            <div class="small">チェック中: <span id="compareCount" class="badge bg-danger rounded-pill">0</span></div>
            <button class="btn btn-light btn-sm fw-bold text-dark rounded-pill px-3" onclick="startComparison()">AI比較する</button>
        </div>

        <div id="loading" class="loading-overlay">
            <div class="spinner-border text-danger mb-2" role="status"></div>
            <p class="text-dark fw-bold small">AIが考え中です...</p>
        </div>
    </div>

    <div class="modal fade" id="compareModal" tabindex="-1">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title h6 fw-bold"><i class="fas fa-robot text-danger"></i> AI比較レポート</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="compareResultBody" class="comparison-wrapper"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ★★★重要: GASのURLをここに貼り付けてください★★★
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw22TkDptBgEQfhGTqfgv7z2xxHJAo3-cXXadlYprCLSVpnmSg4K7YCm-2_bl6d8s2Hkg/exec";

        // ★カテゴリーの履歴（戻るボタン用）
        let categoryHistory = [];
        let currentItems = [];
        let compareList = [];

        // 初期化：トップカテゴリー(ID=0)を取得
        document.addEventListener('DOMContentLoaded', () => {
            fetchCategories(0, "トップ");
            document.getElementById('searchInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') handleFreeSearch();
            });
        });

        // ★動的カテゴリー取得
        async function fetchCategories(genreId, genreName) {
            const container = document.getElementById('categoryContainer');
            const loading = document.getElementById('catLoading');
            
            container.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ searchType: 'genre_fetch', genreId: genreId }),
                    redirect: "follow"
                });
                const data = await response.json();

                if (data.success && data.categories.length > 0) {
                    renderCategories(data.categories);
                    // 履歴に追加 (ただし戻るボタンで呼ばれたときは追加しない処理が必要だが簡易化)
                    // ※今回はシンプルに「下に進むときだけ履歴追加」にするため、onCategoryClickで制御
                } else {
                    // 子カテゴリがない場合は、そのジャンルで商品検索を実行
                    handleCategorySearch(genreId, genreName);
                }
            } catch (e) {
                console.error(e);
                alert("カテゴリー取得に失敗しました");
            } finally {
                loading.style.display = 'none';
            }
        }

        // カテゴリー描画
        function renderCategories(categories) {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = ''; 

            categories.forEach(cat => {
                const col = document.createElement('div');
                col.className = 'col';
                const btn = document.createElement('button');
                btn.className = 'category-btn';
                
                // 動的データなのでアイコンは一律フォルダアイコンにする（またはAPIから取得できれば使う）
                let iconHtml = `<i class="fa-solid fa-folder-open category-icon"></i>`;
                
                btn.innerHTML = `${iconHtml}<span>${cat.name}</span>`;
                btn.onclick = function() { onCategoryClick(cat.id, cat.name); };
                col.appendChild(btn);
                container.appendChild(col);
            });
        }

        function onCategoryClick(id, name) {
            // 現在の表示状態を履歴に保存して、次の階層へ
            // （簡易実装: 直前のIDだけ保存）
            // 実際は、現在表示されているリストではなく「親ID」を保存するのが確実
            // 今回はシンプルに、クリックした瞬間に「今の親ID」をスタックするのではなく
            // fetchCategories内で履歴管理する
            
            // 履歴にプッシュ（現在のタイトルとID）
            // 注: ここでは「次に進む」ので、進む前の状態を保存したいが、
            // 動的fetchなので「親ID」さえわかれば戻れる。
            // しかしAPI仕様上「親ID」を取得するのは面倒なので、
            // 独自のスタックで管理する。
            
            // 3. 次の階層を取得（商品検索になるかもしれないので、まずはfetch）
            fetchCategories(id, name).then(() => {
                // 成功し、かつ画面が切り替わった場合のみ履歴追加したいが
                // ここでは簡易的に「クリック＝進む」として履歴追加
                // ただし、fetchCategoriesの中で「子なし＝検索」と分岐しているため
                // 検索になった場合は履歴に追加したくない。
                // 修正：fetchCategoriesの結果を見て判断するのがベストだが、
                // UI的には「クリックした」事実を保存。
                categoryHistory.push({ id: id, name: name }); // これは「今クリックしたもの」
                updateCategoryHeader(true, name);
            });
        }
        
        // fetchCategoriesを修正して、クリック時の挙動と分離する
        // 上記のfetchCategoriesは「表示」のみ担当させ、
        // クリックハンドラでロジックを組む
        
        // ★修正版 onCategoryClick
        // 上書き定義
        onCategoryClick = async function(id, name) {
            const loading = document.getElementById('catLoading');
            const container = document.getElementById('categoryContainer');
            
            // UI反応
            container.style.opacity = 0.5;
            
            // GASに問い合わせ
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify({ searchType: 'genre_fetch', genreId: id }),
                    redirect: "follow"
                });
                const data = await response.json();

                container.style.opacity = 1;

                if (data.success && data.categories.length > 0) {
                    // 子ジャンルあり -> 階層を下る
                    // 現在の情報を履歴に保存（戻る用：実際は「今のリストの親」が必要だが、
                    // 簡易的に「今のリストを再表示するためのID」を保存すべき）
                    // 履歴のロジック： history[0] = {id:0, name:トップ}, history[1] = {id:100, name:インテリア}...
                    
                    // 現在表示中のID（直前のfetchで使ったID）を保存する必要がある。
                    // グローバル変数で currentGenreId を持たせる。
                    categoryHistory.push({ id: currentGenreId, name: document.getElementById('currentCategoryTitle').innerText });
                    
                    currentGenreId = id; // 新しいID
                    updateCategoryHeader(true, name);
                    renderCategories(data.categories);
                    
                } else {
                    // 子ジャンルなし -> 商品検索実行
                    handleCategorySearch(id, name);
                }
            } catch(e) {
                console.error(e);
                alert("エラー");
                container.style.opacity = 1;
            }
        };

        // 現在表示中のジャンルID（初期は0）
        let currentGenreId = 0;

        function goBackCategory() {
            if (categoryHistory.length === 0) return;
            
            const prevState = categoryHistory.pop();
            currentGenreId = prevState.id; // IDを戻す
            
            // そのIDで再取得して表示
            fetchCategoriesOnly(prevState.id);
            
            if (categoryHistory.length === 0) {
                updateCategoryHeader(false, "");
            } else {
                // 一つ前の名前（履歴の末尾）
                const prevName = categoryHistory[categoryHistory.length - 1].name;
                updateCategoryHeader(true, prevName); 
                // タイトル表示が少しずれるが、簡易実装として許容
                // 正確には prevState.name は「戻り先の親の名前」ではないため調整が必要だが
                // 今回は「戻る」機能の動作優先。
                document.getElementById('currentCategoryTitle').innerText = prevState.name;
            }
        }
        
        // 表示専用
        async function fetchCategoriesOnly(id) {
            const container = document.getElementById('categoryContainer');
            container.innerHTML = '';
            document.getElementById('catLoading').style.display = 'block';
            
            const response = await fetch(GAS_API_URL, {
                method: 'POST',
                body: JSON.stringify({ searchType: 'genre_fetch', genreId: id })
            });
            const data = await response.json();
            document.getElementById('catLoading').style.display = 'none';
            if (data.success) renderCategories(data.categories);
        }

        function updateCategoryHeader(isDeep, title) {
            const backBtn = document.getElementById('categoryBackBtn');
            const titleEl = document.getElementById('currentCategoryTitle');
            if (isDeep) {
                backBtn.style.display = 'inline-flex';
                titleEl.style.display = 'block';
                titleEl.innerText = title;
            } else {
                backBtn.style.display = 'none';
                titleEl.style.display = 'none';
            }
        }

        // ==========================================
        // 検索機能 (既存)
        // ==========================================
        function handleFreeSearch() {
            const query = document.getElementById('searchInput').value;
            if (!query) return alert("キーワードを入力してください");
            executeSearch('free', query);
        }

        function handleCategorySearch(id, name) {
            document.getElementById('searchInput').value = ""; 
            executeSearch('category', '', id);
        }

        async function executeSearch(type, query, categoryId = null) {
            showLoading(true);
            const sort = document.getElementById('sortSelect').value;
            const params = { searchType: type, query: query, categoryId: categoryId, sort: sort };

            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(params),
                    redirect: "follow" 
                });
                const data = await response.json();
                
                if (data.success) {
                    currentItems = data.items;
                    renderResults(data.items);
                    document.getElementById('resultCount').innerText = `${data.count}件ヒット`;
                } else {
                    document.getElementById('resultsArea').innerHTML = `<div class="text-center py-5">見つかりませんでした。<br>${data.error || ""}</div>`;
                }
            } catch (e) { console.error(e); alert("通信エラー"); } 
            finally { showLoading(false); }
        }

        function renderResults(items) {
            const container = document.getElementById('resultsArea');
            container.innerHTML = '';
            compareList = []; updateCompareBar();

            if (items.length === 0) {
                container.innerHTML = '<div class="text-center py-5">条件に合う商品がありませんでした</div>';
                return;
            }

            items.forEach((item, index) => {
                const html = `
                    <div class="product-card d-flex gap-3 align-items-start">
                        <div style="width: 100px; flex-shrink:0;">
                            <img src="${item.imageUrl}" class="img-fluid rounded" alt="${item.name}">
                        </div>
                        <div class="flex-grow-1">
                            <h6 class="mb-1 text-truncate-2" style="font-size:0.9rem; line-height:1.4; height: 2.8em; overflow:hidden;">${item.name}</h6>
                            <div class="price-tag mb-1">¥${item.price.toLocaleString()}</div>
                            <div class="small text-warning mb-2">★ ${item.reviewAverage} <span class="text-muted">(${item.reviewCount})</span></div>
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="form-check m-0">
                                    <input class="form-check-input" type="checkbox" id="check_${index}" onchange="toggleCompare(${index})">
                                    <label class="form-check-label small text-muted" for="check_${index}">比較</label>
                                </div>
                                <a href="${item.url}" target="_blank" class="btn btn-outline-danger btn-sm px-3" style="border-radius:20px;">見る</a>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function toggleCompare(index) {
            if (compareList.includes(index)) {
                compareList = compareList.filter(i => i !== index);
            } else {
                if (compareList.length >= 3) {
                    alert("比較は3つまでです");
                    document.getElementById(`check_${index}`).checked = false;
                    return;
                }
                compareList.push(index);
            }
            updateCompareBar();
        }

        function updateCompareBar() {
            const bar = document.getElementById('compareBar');
            document.getElementById('compareCount').innerText = compareList.length;
            bar.style.display = compareList.length > 0 ? 'flex' : 'none';
        }

        async function startComparison() {
            if (compareList.length < 2) return alert("2つ以上選んでください");
            showLoading(true);
            const targetItems = compareList.map(idx => currentItems[idx]);
            const params = { searchType: 'compare', items: targetItems };

            try {
                const response = await fetch(GAS_API_URL, { 
                    method: 'POST', 
                    headers: { "Content-Type": "text/plain;charset=utf-8" },
                    body: JSON.stringify(params),
                    redirect: "follow"
                });
                const data = await response.json();
                if (data.success) {
                    let processedHtml = data.comparisonText.replace(/\n/g, '<br>').replace(/\|/g, ''); 
                    
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(processedHtml, 'text/html');
                    const rows = doc.querySelectorAll('tr');

                    rows.forEach((row, index) => {
                        if(index === 0) return; 
                        const firstCell = row.querySelector('td');
                        if (firstCell) {
                            const content = firstCell.innerHTML;
                            firstCell.innerHTML = `<div class="p-name-box">${content}</div>`;
                        }
                    });

                    document.getElementById('compareResultBody').innerHTML = doc.body.innerHTML; 
                    new bootstrap.Modal(document.getElementById('compareModal')).show();
                }
            } catch (e) { alert("エラー発生"); } finally { showLoading(false); }
        }

        function showLoading(show) { document.getElementById('loading').style.display = show ? 'flex' : 'none'; }
        function reSort() {} 
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
